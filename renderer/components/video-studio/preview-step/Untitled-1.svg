  <defs>
    <style>
      .apple-path {
        fill: transparent;
        stroke: #000000;
        stroke-width: 2;
        stroke-dasharray: 600;
        stroke-dashoffset: 600;
        animation: draw 3s ease forwards, fillIn 1s 2.5s ease forwards;
